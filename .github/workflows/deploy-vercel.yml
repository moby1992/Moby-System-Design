name: Deploy to Vercel

# Builds and deploys the production app to Vercel on every push to main.
# Requires three repository secrets (Settings → Secrets and variables → Actions):
#   VERCEL_TOKEN       – a Vercel access token (vercel.com/account/tokens)
#   VERCEL_ORG_ID      – from `.vercel/project.json` after `vercel link`
#   VERCEL_PROJECT_ID  – from `.vercel/project.json` after `vercel link`
#
# If you instead connect the repo through Vercel's native Git integration
# (vercel.com/new), Vercel deploys automatically and you can delete this file.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
